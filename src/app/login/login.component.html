<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card shadow-lg border-0 rounded">
        <div class="card-body p-4">
          <h2 class="text-center mb-4">Login Page</h2>

          <div *ngIf="invalidLogin" class="alert alert-danger">
            {{ errorMessage }}
          </div>

          <div class="mb-3">
            <label class="form-label"> Username </label>

            <input
              type="text"
              name="username"
              class="form-control"
              placeholder="Enter username"
              [(ngModel)]="username"
            />
          </div>

          <div class="mb-4">
            <label class="form-label"> Password </label>

            <input
              type="password"
              name="password"
              class="form-control"
              placeholder="Enter password"
              [(ngModel)]="password"
            />
          </div>

          <div class="d-grid">
            <button class="btn btn-success" (click)="handleLogin()">
              Login
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
